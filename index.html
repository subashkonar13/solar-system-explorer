<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌌 Solar System Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --sun:#FFB347;
  --teal:#00E5FF;
  --accent:#FF6B35;
  --gold:#FFD700;
  --bg:#02020A;
  --panel:rgba(4,8,24,0.92);
  --border:rgba(0,229,255,0.2);
  --text:#DFF4FF;
  --muted:rgba(223,244,255,0.45);
}

html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Rajdhani',sans-serif;color:var(--text)}

canvas{display:block;position:fixed;inset:0;z-index:0}

/* ─── LOADING ─── */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .9s ease;
}
#loader.out{opacity:0;pointer-events:none}
.l-title{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(1.4rem,4vw,2.8rem);
  color:var(--gold);letter-spacing:4px;
  text-shadow:0 0 40px rgba(255,215,0,.55);
  margin-bottom:8px;
}
.l-sub{font-size:.75rem;letter-spacing:5px;color:var(--teal);text-transform:uppercase;opacity:.7;margin-bottom:44px}
.l-bar{width:240px;height:2px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.l-fill{height:100%;background:linear-gradient(90deg,#7B2FBE,var(--teal));animation:lf 2.5s ease forwards;border-radius:4px}
@keyframes lf{0%{width:0}100%{width:100%}}
.l-dots{margin-top:18px;display:flex;gap:8px}
.l-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);opacity:.3;animation:ld 1.4s ease-in-out infinite}
.l-dot:nth-child(2){animation-delay:.2s}
.l-dot:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

/* ─── HEADER ─── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(2,2,10,.95) 0%,transparent 100%);
  pointer-events:none;
}
.hdr-title{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(.85rem,2vw,1.35rem);
  color:var(--gold);letter-spacing:2px;
  text-shadow:0 0 18px rgba(255,215,0,.5);
}
.hdr-sub{font-size:.65rem;letter-spacing:4px;color:var(--teal);text-transform:uppercase;opacity:.65;margin-top:2px}
.hdr-badge{
  font-size:.65rem;letter-spacing:3px;color:rgba(255,255,255,.3);
  text-transform:uppercase;border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:4px 12px;
}

/* ─── HINT ─── */
#hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:.7rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.3);z-index:100;pointer-events:none;
  animation:ph 3s ease-in-out infinite;
}
@keyframes ph{0%,100%{opacity:.2}50%{opacity:.6}}

/* ─── SPEED CONTROL ─── */
#spd{
  position:fixed;bottom:24px;right:22px;z-index:100;
  display:flex;flex-direction:column;align-items:flex-end;gap:7px;
}
.spd-lbl{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.spd-row{display:flex;gap:6px}
.spd-btn{
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;color:var(--teal);
  padding:6px 11px;font-family:'Orbitron',sans-serif;font-size:.62rem;
  cursor:pointer;letter-spacing:1px;backdrop-filter:blur(8px);
  transition:background .2s,box-shadow .2s,border-color .2s;
}
.spd-btn:hover,.spd-btn.on{
  background:rgba(0,229,255,.12);
  border-color:rgba(0,229,255,.5);
  box-shadow:0 0 12px rgba(0,229,255,.3);
}

/* ─── TOOLTIP ─── */
#tip{
  position:fixed;z-index:500;pointer-events:none;
  opacity:0;transition:opacity .18s ease;min-width:230px;
}
#tip.show{opacity:1}
.tip-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;
  backdrop-filter:blur(14px);
  box-shadow:0 0 40px rgba(0,229,255,.12),0 12px 40px rgba(0,0,0,.7);
}
.tip-name{
  font-family:'Orbitron',sans-serif;font-size:1.05rem;font-weight:700;
  color:var(--gold);margin-bottom:12px;
  text-shadow:0 0 12px rgba(255,215,0,.4);
}
.tip-row{
  display:flex;justify-content:space-between;
  font-size:.76rem;margin-bottom:5px;gap:14px;
}
.tip-lbl{color:var(--muted)}
.tip-val{color:var(--teal);font-weight:600;text-align:right}
.tip-hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.tip-more{
  display:block;width:100%;margin-top:10px;
  padding:8px 0;
  background:linear-gradient(135deg,#1a0a3a,#0a1a3a);
  border:1px solid rgba(0,229,255,.25);
  border-radius:9px;color:#fff;
  font-family:'Orbitron',sans-serif;font-size:.62rem;
  letter-spacing:2px;cursor:pointer;text-transform:uppercase;
  pointer-events:all;
  transition:background .2s,box-shadow .2s;
}
.tip-more:hover{
  background:linear-gradient(135deg,#2a1a5a,#0a2a5a);
  box-shadow:0 0 16px rgba(0,229,255,.3);
}

/* ─── DETAIL PANEL ─── */
#panel{
  position:fixed;top:0;right:0;
  width:min(420px,96vw);height:100%;
  background:var(--panel);
  border-left:1px solid var(--border);
  backdrop-filter:blur(18px);
  z-index:600;overflow-y:auto;
  transform:translateX(110%);
  transition:transform .42s cubic-bezier(.22,.68,0,1.2);
}
#panel.open{transform:translateX(0)}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.pan-hdr{
  position:sticky;top:0;
  background:rgba(2,4,16,.97);
  border-bottom:1px solid var(--border);
  padding:20px 22px 16px;backdrop-filter:blur(10px);z-index:1;
}
.pan-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.pan-close:hover{background:rgba(255,255,255,.16)}
.pan-pname{
  font-family:'Orbitron',sans-serif;font-size:1.45rem;font-weight:900;
  color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.35);
}
.pan-ptype{font-size:.66rem;letter-spacing:4px;text-transform:uppercase;color:var(--teal);opacity:.75;margin-top:3px}

.pan-body{padding:22px}
.pan-emoji{font-size:3.8rem;text-align:center;margin-bottom:18px;
  filter:drop-shadow(0 0 22px rgba(255,215,0,.3))}
.pan-desc{font-size:.88rem;line-height:1.75;color:rgba(255,255,255,.8);margin-bottom:22px}

.sec-ttl{
  font-family:'Orbitron',sans-serif;font-size:.6rem;
  letter-spacing:4px;text-transform:uppercase;color:var(--teal);
  margin-bottom:12px;padding-bottom:7px;
  border-bottom:1px solid var(--border);
}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px}
.stat-box{
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:12px;text-align:center;
}
.stat-box .sk{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.stat-box .sv{
  font-family:'Orbitron',sans-serif;font-size:.8rem;
  color:var(--gold);font-weight:700;
}
.moon-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.moon-tag{
  background:rgba(0,229,255,.08);
  border:1px solid rgba(0,229,255,.18);
  border-radius:20px;padding:4px 12px;
  font-size:.72rem;color:var(--teal);
}
.fact-box{
  background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(0,229,255,.05));
  border:1px solid rgba(255,107,53,.2);
  border-radius:12px;padding:14px 16px;margin-bottom:12px;
}
.fact-box .fk{font-size:.62rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.fact-box p{font-size:.84rem;line-height:1.65;color:rgba(255,255,255,.78)}

/* ─── ORBIT LABEL CANVAS ─── */
#labels{position:fixed;inset:0;pointer-events:none;z-index:10}
</style>
</head>

<div id="tip">

<div id="panel">

    <div class="pan-pname" id="pname"></div>
    <div class="pan-ptype" id="ptype"></div>
  </div>
  <div class="pan-body">
    <div class="pan-emoji" id="pemoji"></div>
    <p class="pan-desc" id="pdesc"></p>
    <div class="sec-ttl">📊 Statistics</div>
    <div class="stat-grid" id="pstats"></div>
    <div class="sec-ttl">🌕 Known Moons</div>
    <div class="moon-wrap" id="pmoons"></div>
    <div class="sec-ttl">⭐ Fun Facts</div>
    <div id="pfacts"></div>
  </div>
</div>

const canvas = document.getElementById('c');

const cam = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);
cam.position.set(0, 70, 160);

// Controls
const ctrl = new OrbitControls(cam, canvas);
ctrl.enableDamping = true;
ctrl.dampingFactor = 0.06;
ctrl.minDistance = 5;
ctrl.maxDistance = 280;
ctrl.maxPolarAngle = Math.PI * 0.88;

// ── LIGHTS ──
const sunLight = new THREE.PointLight(0xFFE0A0, 3.5, 0, 1.2);
sunLight.position.set(0,0,0);
sunLight.castShadow = true;
scene.add(sunLight);

const ambLight = new THREE.AmbientLight(0x0d1133, 0.8);
scene.add(ambLight);

// ── STARS ──
(function buildStars(){
  const geo = new THREE.BufferGeometry();
  const N = 8000;
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    const r = 700 + Math.random()*300;
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2] = r*Math.cos(phi);
    const bright = 0.5+Math.random()*0.5;
    const hue = Math.random();
    col[i*3]   = bright*(hue>0.8?1.0:hue>0.5?0.8:0.7);
    col[i*3+1] = bright*(hue>0.8?0.9:hue>0.5?0.85:0.7);
    col[i*3+2] = bright*(hue>0.8?0.7:hue>0.5?1.0:0.9);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const mat = new THREE.PointsMaterial({size:0.8,vertexColors:true,transparent:true,opacity:0.85,sizeAttenuation:true});
  scene.add(new THREE.Points(geo,mat));
})();

// ── SUN ──
const sunGeo = new THREE.SphereGeometry(8, 64, 64);
const sunMat = new THREE.MeshStandardMaterial({
  color:0xFFB347,
  emissive:0xFF7700,
  emissiveIntensity:1.2,
  roughness:0.8,
  metalness:0.0
});
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.name = 'Sun';
scene.add(sun);

// Sun corona glow (sprite)
{
  const spriteMat = new THREE.SpriteMaterial({
    map: createGlowTexture(),
    color:0xFFAA44,
    transparent:true,
    opacity:0.55,
    blending:THREE.AdditiveBlending,
    depthWrite:false
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(36,36,1);
  sprite.renderOrder = -1;
  sun.add(sprite);
}

function createGlowTexture(){
  const sz=256, canvas=document.createElement('canvas');
  canvas.width=canvas.height=sz;
  const ctx=canvas.getContext('2d');
  const g=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  g.addColorStop(0,'rgba(255,200,80,1)');
  g.addColorStop(0.3,'rgba(255,140,40,0.6)');
  g.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(canvas);
}

// ── ORBIT RINGS ──
function makeOrbit(r){
  const pts=[];
  for(let i=0;i<=256;i++){
    const a=i/256*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*r,0,Math.sin(a)*r));
  }
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:0x1a2a4a,transparent:true,opacity:0.45});
  const line=new THREE.Line(geo,mat);
  line.raycast=()=>{};
  scene.add(line);
}

// ── PROCEDURAL PLANET TEXTURES ──
function makePlanetTexture(hex, bands=false, isEarth=false){
  const sz=512, cnv=document.createElement('canvas');
  cnv.width=cnv.height=sz;
  const ctx=cnv.getContext('2d');
  const c=new THREE.Color(hex);

  if(isEarth){
    // ocean base
    ctx.fillStyle=`hsl(215,70%,35%)`;
    ctx.fillRect(0,0,sz,sz);
    // continents
    ctx.fillStyle=`hsl(100,45%,30%)`;
    for(let i=0;i<18;i++){
      ctx.beginPath();
      ctx.ellipse(Math.random()*sz,Math.random()*sz,
        20+Math.random()*80,15+Math.random()*60,
        Math.random()*Math.PI,0,Math.PI*2);
      ctx.fill();
    }
    // ice caps
    ctx.fillStyle='rgba(220,235,255,0.8)';
    ctx.fillRect(0,0,sz,40);
    ctx.fillRect(0,sz-40,sz,40);
  } else if(bands){
    // Jupiter-style bands
    const r=Math.round(c.r*255),g=Math.round(c.g*255),b=Math.round(c.b*255);
    for(let y=0;y<sz;y++){
      const band=Math.sin(y/sz*Math.PI*18+Math.random()*0.2)*0.15;
      ctx.fillStyle=`rgb(${Math.min(255,r+band*60|0)},${Math.min(255,g+band*40|0)},${Math.min(255,b+band*20|0)})`;
      ctx.fillRect(0,y,sz,1);
    }
    // Great Red Spot for Jupiter
    ctx.save();
    ctx.translate(sz*0.55,sz*0.55);
    ctx.scale(1,0.5);
    const grs=ctx.createRadialGradient(0,0,0,0,0,sz*0.08);
    grs.addColorStop(0,'rgba(180,60,40,0.9)');
    grs.addColorStop(1,'rgba(180,60,40,0)');
    ctx.fillStyle=grs;
    ctx.beginPath(); ctx.arc(0,0,sz*0.08,0,Math.PI*2); ctx.fill();
    ctx.restore();
  } else {
    // generic rocky/gas texture
    const r=Math.round(c.r*255),g=Math.round(c.g*255),b=Math.round(c.b*255);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(0,0,sz,sz);
    // noise patches
    for(let i=0;i<600;i++){
      const dr=(Math.random()-0.5)*55;
      ctx.fillStyle=`rgba(${r+dr|0},${g+dr|0},${b+dr|0},0.25)`;
      ctx.beginPath();
      ctx.arc(Math.random()*sz,Math.random()*sz,1+Math.random()*12,0,Math.PI*2);
      ctx.fill();
    }
  }
  return new THREE.CanvasTexture(cnv);
}

// ── SATURN RINGS TEXTURE ──
function makeRingTexture(){
  const sz=512,cnv=document.createElement('canvas');
  cnv.width=sz; cnv.height=4;
  const ctx=cnv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,sz,0);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(0.1,'rgba(180,160,110,0.2)');
  g.addColorStop(0.25,'rgba(200,185,140,0.7)');
  g.addColorStop(0.4,'rgba(170,150,100,0.5)');
  g.addColorStop(0.55,'rgba(210,195,155,0.85)');
  g.addColorStop(0.7,'rgba(165,145,95,0.4)');
  g.addColorStop(0.85,'rgba(185,170,125,0.6)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,sz,4);
  return new THREE.CanvasTexture(cnv);
}

// ════════════════════════════════════════════════════
//  BUILD PLANETS
// ════════════════════════════════════════════════════
const pickables = [sun]; // all meshes we can pick
const planetObjs = {};   // name → {pivot, mesh, cfg}
let moonAngle = 0;
let moonMesh = null, moonPivot = null;

PCONF.forEach(cfg=>{
  makeOrbit(cfg.orbitR);
  const pivot = new THREE.Object3D();
  pivot.rotation.y = Math.random()*Math.PI*2;
  scene.add(pivot);

  const isEarth = cfg.name==='Earth';
  const isBands  = cfg.bands||false;
  const tex = makePlanetTexture(cfg.color, isBands, isEarth);

  const geo = new THREE.SphereGeometry(cfg.r*1.18, 48, 48);
  const mat = new THREE.MeshStandardMaterial({
    map:tex,
    roughness:cfg.name==='Venus'?0.95:0.82,
    metalness:0.05
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.name = cfg.name;
  mesh.position.x = cfg.orbitR;
  mesh.rotation.z = THREE.MathUtils.degToRad(cfg.tilt||0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  pivot.add(mesh);
  pickables.push(mesh);

  // Saturn rings
  if(cfg.rings){
    const rInner = cfg.r*1.18*1.35;
    const rOuter = cfg.r*1.18*2.65;
    const rGeo = new THREE.RingGeometry(rInner, rOuter, 128);
    // fix UVs for ring texture
    const pos=rGeo.attributes.position;
    const uv=rGeo.attributes.uv;
    for(let i=0;i<pos.count;i++){
      const v=new THREE.Vector3().fromBufferAttribute(pos,i);
      const t=(v.length()-rInner)/(rOuter-rInner);
      uv.setXY(i,t,0.5);
    }
    const rMat = new THREE.MeshBasicMaterial({
      map:makeRingTexture(),
      side:THREE.DoubleSide,
      transparent:true,
      opacity:0.88,
      depthWrite:false
    });
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = Math.PI/2;
    ring.raycast=()=>{};
    mesh.add(ring);
  }

  // Earth Moon
  if(cfg.moon){
    moonPivot = new THREE.Object3D();
    moonPivot.position.x = cfg.orbitR;
    pivot.add(moonPivot);

    const mGeo = new THREE.SphereGeometry(0.32,24,24);
    const mTex = makePlanetTexture(0xAAAAAA);
    const mMat = new THREE.MeshStandardMaterial({map:mTex,roughness:0.95,metalness:0.0});
    moonMesh = new THREE.Mesh(mGeo,mMat);
    moonMesh.name = 'Moon';
    moonMesh.position.x = 3.4;
    moonMesh.raycast=()=>{};
    moonPivot.add(moonMesh);
  }

  planetObjs[cfg.name] = {pivot, mesh, cfg};
});

// ════════════════════════════════════════════════════
//  RAYCASTER + POINTER
// ════════════════════════════════════════════════════
const ray = new THREE.Raycaster();
const pointer = new THREE.Vector2(-9999,-9999);

window.addEventListener('mousemove', e=>{
  pointer.x = (e.clientX/window.innerWidth)*2-1;
  pointer.y = -(e.clientY/window.innerHeight)*2+1;
  lastMouseX=e.clientX; lastMouseY=e.clientY;
});
window.addEventListener('click', handleClick);
window.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    pointer.x=(e.touches[0].clientX/window.innerWidth)*2-1;
    pointer.y=-(e.touches[0].clientY/window.innerHeight)*2+1;
    lastMouseX=e.touches[0].clientX;
    lastMouseY=e.touches[0].clientY;
    handleClick();
  }
},{passive:true});

let lastMouseX=0, lastMouseY=0;
let hoveredName=null;

function handleClick(){
  ray.setFromCamera(pointer, cam);
  const hits = ray.intersectObjects(pickables,false);
  if(hits.length){
    const name = hits[0].object.name;
    if(DATA[name]) zoomTo(name);
  }
}

// ── TOOLTIP ──
const tip = document.getElementById('tip');

function showTip(name, x, y){
  const d = DATA[name];
  document.getElementById('tname').textContent = name;
  document.getElementById('tmass').textContent = d.tip.mass;
  document.getElementById('tdiam').textContent = d.tip.diam;
  document.getElementById('tdist').textContent = d.tip.dist;
  document.getElementById('trot').textContent  = d.tip.rot;
  document.getElementById('trev').textContent  = d.tip.rev;
  document.getElementById('tmoons').textContent= d.tip.moons;
  document.getElementById('tmore').onclick = ()=>openPanel(name);

  let tx=x+18, ty=y-12;
  if(tx+250>window.innerWidth) tx=x-268;
  if(ty+290>window.innerHeight) ty=y-290;
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
  tip.classList.add('show');
  canvas.style.cursor='pointer';
}
function hideTip(){tip.classList.remove('show'); canvas.style.cursor='default';}

// ── ZOOM ──
let camZooming=false;
function zoomTo(name){
  let target;
  if(name==='Sun'){
    target = new THREE.Vector3(0,0,0);
  } else {
    const obj = planetObjs[name];
    target = new THREE.Vector3();
    obj.mesh.getWorldPosition(target);
  }
  const radius = name==='Sun'?8:planetObjs[name].cfg.r*1.18;
  const dist = radius*8+6;
  const dir = cam.position.clone().sub(target).normalize();
  const endPos = target.clone().add(dir.multiplyScalar(dist));

  camZooming=true;
  animateCam(cam.position.clone(), endPos, ctrl.target.clone(), target.clone(), 900, ()=>{camZooming=false;});
}

function animateCam(fromPos, toPos, fromTarget, toTarget, dur, cb){
  const start=performance.now();
  function step(now){
    const t=Math.min((now-start)/dur,1);
    const e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    cam.position.lerpVectors(fromPos,toPos,e);
    ctrl.target.lerpVectors(fromTarget,toTarget,e);
    ctrl.update();
    if(t<1) requestAnimationFrame(step); else cb&&cb();
  }
  requestAnimationFrame(step);
}

// ── OPEN / CLOSE PANEL ──
window.openPanel = function(name){
  const d=DATA[name];
  document.getElementById('pname').textContent=name;
  document.getElementById('ptype').textContent=d.type;
  document.getElementById('pemoji').textContent=d.emoji;
  document.getElementById('pdesc').textContent=d.desc;
  const sg=document.getElementById('pstats');
  sg.innerHTML=Object.entries(d.stats).map(([k,v])=>`
    <div class="stat-box"><div class="sk">${k}</div><div class="sv">${v}</div></div>`).join('');
  const mw=document.getElementById('pmoons');
  mw.innerHTML=d.moons.length
    ? d.moons.map(m=>`<span class="moon-tag">🌕 ${m}</span>`).join('')
    : `<span style="color:rgba(255,255,255,.25);font-size:.8rem">No known moons</span>`;
  document.getElementById('pfacts').innerHTML=d.facts.map(f=>`
    <div class="fact-box"><div class="fk">⭐ Did You Know?</div><p>${f}</p></div>`).join('');
  document.getElementById('panel').classList.add('open');
};
window.closePanel = function(){document.getElementById('panel').classList.remove('open');};

// ── SPEED ──
let spd=1;
window.setSpd = function(s,btn){
  spd=s;
  document.querySelectorAll('.spd-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
};

// ── LABEL CANVAS ──
const lblCanvas=document.getElementById('labels');
const lblCtx=lblCanvas.getContext('2d');
function resizeLabels(){lblCanvas.width=window.innerWidth;lblCanvas.height=window.innerHeight;}
resizeLabels();

function drawLabels(){
  lblCtx.clearRect(0,0,lblCanvas.width,lblCanvas.height);
  const allObjs=[{name:'Sun',mesh:sun},...Object.values(planetObjs).map(o=>({name:o.cfg.name,mesh:o.mesh}))];
  allObjs.forEach(({name,mesh})=>{
    const wp=new THREE.Vector3();
    mesh.getWorldPosition(wp);
    const sp=wp.clone().project(cam);
    const x=(sp.x+1)/2*lblCanvas.width;
    const y=(-sp.y+1)/2*lblCanvas.height;
    if(sp.z>1) return; // behind camera
    lblCtx.save();
    lblCtx.font='bold 11px Orbitron,sans-serif';
    lblCtx.letterSpacing='2px';
    lblCtx.fillStyle='rgba(0,229,255,0.55)';
    lblCtx.textAlign='center';
    lblCtx.fillText(name.toUpperCase(), x, y-20);
    lblCtx.restore();
  });
}

// ════════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════════
const clock = new THREE.Clock();
let elapsed=0;

renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta();
  elapsed+=dt*spd;

  // Sun rotation
  sun.rotation.y+=dt*0.02*spd;

  // Planet orbit + self-rotation
  PCONF.forEach(cfg=>{
    const obj=planetObjs[cfg.name];
    obj.pivot.rotation.y += cfg.spd*0.006*spd*dt*60;
    obj.mesh.rotation.y  += cfg.selfRot*0.04*spd*dt*60;
  });

  // Moon orbit
  if(moonMesh && moonPivot){
    moonAngle += 2.0*spd*dt;
    moonPivot.rotation.y = moonAngle;
  }

  // Hover detection
  if(!camZooming){
    ray.setFromCamera(pointer, cam);
    const hits=ray.intersectObjects(pickables,false);
    if(hits.length && DATA[hits[0].object.name]){
      const nm=hits[0].object.name;
      if(nm!==hoveredName){ hoveredName=nm; }
      showTip(nm,lastMouseX,lastMouseY);
    } else {
      hoveredName=null; hideTip();
    }
  }

  ctrl.update();
  renderer.render(scene, cam);
  drawLabels();
});

// ── RESIZE ──
window.addEventListener('resize',()=>{
  cam.aspect=window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  resizeLabels();
});

// ── HIDE LOADER ──
setTimeout(()=>document.getElementById('loader').classList.add('out'), 2600);
</script>
