<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌌 Solar System Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00E5FF;--accent:#FF6B35;--gold:#FFD700;
  --bg:#02020A;--panel:rgba(4,8,24,0.92);--border:rgba(0,229,255,0.2);
  --text:#DFF4FF;--muted:rgba(223,244,255,0.45);
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Rajdhani',sans-serif;color:var(--text)}
canvas{display:block;position:fixed;inset:0;z-index:0}

/* LOADING */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .9s ease}
#loader.out{opacity:0;pointer-events:none}
.l-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(1.4rem,4vw,2.8rem);color:var(--gold);letter-spacing:4px;text-shadow:0 0 40px rgba(255,215,0,.55);margin-bottom:8px}
.l-sub{font-size:.75rem;letter-spacing:5px;color:var(--teal);text-transform:uppercase;opacity:.7;margin-bottom:44px}
.l-bar{width:240px;height:2px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.l-fill{height:100%;background:linear-gradient(90deg,#7B2FBE,var(--teal));animation:lf 2.5s ease forwards;border-radius:4px}
@keyframes lf{0%{width:0}100%{width:100%}}
.l-dots{margin-top:18px;display:flex;gap:8px}
.l-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);opacity:.3;animation:ld 1.4s ease-in-out infinite}
.l-dot:nth-child(2){animation-delay:.2s}.l-dot:nth-child(3){animation-delay:.4s}
@keyframes ld{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(2,2,10,.95) 0%,transparent 100%);pointer-events:none}
.hdr-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(.85rem,2vw,1.35rem);color:var(--gold);letter-spacing:2px;text-shadow:0 0 18px rgba(255,215,0,.5)}
.hdr-sub{font-size:.65rem;letter-spacing:4px;color:var(--teal);text-transform:uppercase;opacity:.65;margin-top:2px}

/* HINT */
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);z-index:100;pointer-events:none;animation:ph 3s ease-in-out infinite}
@keyframes ph{0%,100%{opacity:.2}50%{opacity:.6}}

/* SPEED */
#spd{position:fixed;bottom:24px;right:22px;z-index:100;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.spd-lbl{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.spd-row{display:flex;gap:6px}
.spd-btn{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--teal);padding:6px 11px;font-family:'Orbitron',sans-serif;font-size:.62rem;cursor:pointer;letter-spacing:1px;backdrop-filter:blur(8px);transition:background .2s,box-shadow .2s,border-color .2s}
.spd-btn:hover,.spd-btn.on{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.5);box-shadow:0 0 12px rgba(0,229,255,.3)}

/* SOUND BUTTON */
#snd-btn{position:fixed;top:16px;right:22px;z-index:200;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:30px;padding:7px 16px;font-family:'Orbitron',sans-serif;font-size:.62rem;letter-spacing:2px;color:var(--teal);cursor:pointer;backdrop-filter:blur(10px);transition:background .2s,box-shadow .2s,border-color .2s;text-transform:uppercase}
#snd-btn:hover{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.5);box-shadow:0 0 18px rgba(0,229,255,.25)}
#snd-btn .snd-icon{font-size:1rem;line-height:1}
#snd-btn .snd-bars{display:flex;align-items:flex-end;gap:2px;height:14px}
#snd-btn .snd-bars span{display:block;width:3px;background:var(--teal);border-radius:2px;opacity:0.4;height:4px}
#snd-btn.playing .snd-bars span{opacity:1}
#snd-btn.playing .snd-bars span:nth-child(1){animation:bar 1.1s ease-in-out infinite}
#snd-btn.playing .snd-bars span:nth-child(2){animation:bar 0.85s ease-in-out infinite .15s}
#snd-btn.playing .snd-bars span:nth-child(3){animation:bar 1.3s ease-in-out infinite .05s}
#snd-btn.playing .snd-bars span:nth-child(4){animation:bar 0.95s ease-in-out infinite .3s}
@keyframes bar{0%,100%{height:3px}50%{height:13px}}

/* YOUTUBE PLAYER (hidden) */
#yt-player{position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}

/* TOOLTIP */
#tip{position:fixed;z-index:500;pointer-events:none;opacity:0;transition:opacity .18s ease;min-width:230px}
#tip.show{opacity:1}
.tip-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px 20px;backdrop-filter:blur(14px);box-shadow:0 0 40px rgba(0,229,255,.12),0 12px 40px rgba(0,0,0,.7)}
.tip-name{font-family:'Orbitron',sans-serif;font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:12px;text-shadow:0 0 12px rgba(255,215,0,.4)}
.tip-row{display:flex;justify-content:space-between;font-size:.76rem;margin-bottom:5px;gap:14px}
.tip-lbl{color:var(--muted)}.tip-val{color:var(--teal);font-weight:600;text-align:right}
.tip-hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.tip-more{display:block;width:100%;margin-top:10px;padding:8px 0;background:linear-gradient(135deg,#1a0a3a,#0a1a3a);border:1px solid rgba(0,229,255,.25);border-radius:9px;color:#fff;font-family:'Orbitron',sans-serif;font-size:.62rem;letter-spacing:2px;cursor:pointer;text-transform:uppercase;pointer-events:all;transition:background .2s,box-shadow .2s}
.tip-more:hover{background:linear-gradient(135deg,#2a1a5a,#0a2a5a);box-shadow:0 0 16px rgba(0,229,255,.3)}

/* DETAIL PANEL */
#panel{position:fixed;top:0;right:0;width:min(420px,96vw);height:100%;background:var(--panel);border-left:1px solid var(--border);backdrop-filter:blur(18px);z-index:600;overflow-y:auto;transform:translateX(110%);transition:transform .42s cubic-bezier(.22,.68,0,1.2)}
#panel.open{transform:translateX(0)}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.pan-hdr{position:sticky;top:0;background:rgba(2,4,16,.97);border-bottom:1px solid var(--border);padding:20px 22px 16px;backdrop-filter:blur(10px);z-index:1}
.pan-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.pan-close:hover{background:rgba(255,255,255,.16)}
.pan-pname{font-family:'Orbitron',sans-serif;font-size:1.45rem;font-weight:900;color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.35)}
.pan-ptype{font-size:.66rem;letter-spacing:4px;text-transform:uppercase;color:var(--teal);opacity:.75;margin-top:3px}
.pan-body{padding:22px}
.pan-emoji{font-size:3.8rem;text-align:center;margin-bottom:18px;filter:drop-shadow(0 0 22px rgba(255,215,0,.3))}
.pan-desc{font-size:.88rem;line-height:1.75;color:rgba(255,255,255,.8);margin-bottom:22px}
.sec-ttl{font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--teal);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px}
.stat-box{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px;text-align:center}
.stat-box .sk{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.stat-box .sv{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--gold);font-weight:700}
.moon-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px}
.moon-tag{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.18);border-radius:20px;padding:4px 12px;font-size:.72rem;color:var(--teal)}
.fact-box{background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(0,229,255,.05));border:1px solid rgba(255,107,53,.2);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.fact-box .fk{font-size:.62rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.fact-box p{font-size:.84rem;line-height:1.65;color:rgba(255,255,255,.78)}

/* LABEL CANVAS */
#labels{position:fixed;inset:0;pointer-events:none;z-index:10}
</style>
</head>

<!-- Three.js loader: sequential, reliable, with graceful error -->
<script>
(function(){
  var TIMEOUT = 12000;
  var THREE_URLS = [
    'https://unpkg.com/three@0.128.0/build/three.min.js',
    'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js'
  ];
  var ORBIT_URLS = [
    'https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js',
    'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js'
  ];

  function showError(){
    var l=document.getElementById('loader');
    if(!l||l.classList.contains('out')) return;
    var sub=l.querySelector('.l-sub');
    var bar=l.querySelector('.l-bar');
    var dots=l.querySelector('.l-dots');
    if(sub){sub.textContent='⚠ Could not load 3D engine. Check your internet connection & reload.';sub.style.color='#FF6B35';sub.style.letterSpacing='0px';sub.style.fontSize='0.8rem';}
    if(bar) bar.style.display='none';
    if(dots) dots.style.display='none';
  }

  window._threeLoadTimer = setTimeout(showError, TIMEOUT);

  function loadScript(urls, idx, onSuccess, onFail){
    if(idx >= urls.length){ onFail(); return; }
    var s = document.createElement('script');
    s.src = urls[idx];
    s.onload  = onSuccess;
    s.onerror = function(){ loadScript(urls, idx+1, onSuccess, onFail); };
    document.head.appendChild(s);
  }

  // Step 1: load Three.js
  loadScript(THREE_URLS, 0, function(){
    // Step 2: load OrbitControls (depends on THREE being present)
    loadScript(ORBIT_URLS, 0, function(){
      // Both loaded — fire custom event so main script can start
      document.dispatchEvent(new Event('threejs-ready'));
    }, showError);
  }, showError);
})();
</script>

// ── STARS ──
(()=>{
  const geo = new THREE.BufferGeometry();
  const N = 8000;
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const theta=Math.random()*Math.PI*2;
    const phi=Math.acos(2*Math.random()-1);
    const r=700+Math.random()*300;
    pos[i*3]=r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
    pos[i*3+2]=r*Math.cos(phi);
    const b=0.5+Math.random()*0.5, h=Math.random();
    col[i*3]=b*(h>0.8?1.0:0.75);
    col[i*3+1]=b*(h>0.5?0.85:0.70);
    col[i*3+2]=b*(h>0.8?0.7:0.95);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:0.8,vertexColors:true,transparent:true,opacity:0.85,sizeAttenuation:true})));
})();

//  TEXTURE SYSTEM
//  Strategy: try multiple CDN URLs → if all fail,
//  use a rich procedural canvas texture as fallback.
//  Each planet has a hand-crafted fallback so it
//  always looks accurate and vivid.
// ════════════════════════════════════════════════════

const SS2 = 'https://www.solarsystemscope.com/textures/';
const CDNS = {

  Mercury:     [SS+'2k_mercury.jpg',     SS2+'2k_mercury.jpg'],
  Venus:       [SS+'2k_venus_surface.jpg',SS2+'2k_venus_surface.jpg'],

  EarthNormal: [SS+'2k_earth_normal_map.png', SS2+'2k_earth_normal_map.png'],

function mkCanvas(w=SZ,h=SZ){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }

const FALLBACKS = procFallbacks();

// ── TEXTURE LOADER WITH FALLBACK ──
const tloader = new THREE.TextureLoader();
tloader.crossOrigin = 'anonymous';

// Returns a THREE.Texture — tries CDN URLs first, falls back to canvas
function lt(key) {
  const fallbackCanvas = FALLBACKS[key];
  const urls = CDNS[key] || [];

  // Start with fallback immediately so planet is never black
  let tex;
  if(fallbackCanvas){
    tex = new THREE.CanvasTexture(fallbackCanvas);
    tex.colorSpace = THREE.SRGBColorSpace;
  } else {
    tex = new THREE.Texture();
  }

  // Try each CDN URL; on success, swap texture image in-place
  let tried = 0;
  function tryNext(){
    if(tried >= urls.length) return; // all failed, keep fallback
    const url = urls[tried++];
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      tex.image = img;
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
    };
    img.onerror = tryNext; // next URL
    img.src = url;
  }
  tryNext();

  return tex;
}

// ── SUN MESH ──
function makeGlowTex(){
  const sz=256,c=document.createElement('canvas');
  c.width=c.height=sz;
  const ctx=c.getContext('2d'),g=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  g.addColorStop(0,'rgba(255,200,80,1)');
  g.addColorStop(0.3,'rgba(255,140,40,0.6)');
  g.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(c);
}
const sunTex = lt('Sun');
const sunMat = new THREE.MeshStandardMaterial({map:sunTex,emissiveMap:sunTex,emissive:0xFFFFFF,emissiveIntensity:1.0,roughness:1,metalness:0});
const sun = new THREE.Mesh(new THREE.SphereGeometry(8,64,64), sunMat);
sun.name='Sun';
scene.add(sun);
const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({map:makeGlowTex(),color:0xFFAA44,transparent:true,opacity:0.55,blending:THREE.AdditiveBlending,depthWrite:false}));
glowSprite.scale.set(38,38,1);
glowSprite.renderOrder=-1;
sun.add(glowSprite);

// ── ORBIT LINE ──
function makeOrbit(r){
  const pts=[];
  for(let i=0;i<=256;i++){const a=i/256*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*r,0,Math.sin(a)*r));}
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x1a2a4a,transparent:true,opacity:0.45}));
  line.raycast=()=>{};
  scene.add(line);
}

// ── SATURN RING CANVAS ──
function makeRingTex(){
  const sz=1024,c=document.createElement('canvas');c.width=sz;c.height=8;
  const ctx=c.getContext('2d'),g=ctx.createLinearGradient(0,0,sz,0);
  g.addColorStop(0.00,'rgba(0,0,0,0)');
  g.addColorStop(0.08,'rgba(120,105,75,0.15)');
  g.addColorStop(0.20,'rgba(190,172,128,0.60)');
  g.addColorStop(0.32,'rgba(215,198,152,0.88)');
  g.addColorStop(0.44,'rgba(195,178,130,0.65)');
  g.addColorStop(0.50,'rgba(40,35,25,0.08)');
  g.addColorStop(0.56,'rgba(175,160,115,0.52)');
  g.addColorStop(0.68,'rgba(218,200,155,0.84)');
  g.addColorStop(0.80,'rgba(170,155,110,0.45)');
  g.addColorStop(0.92,'rgba(130,118,85,0.18)');
  g.addColorStop(1.00,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,sz,8);
  return new THREE.CanvasTexture(c);
}

// ═══════════════════════════════════════════════════
//  BUILD PLANETS
// ═══════════════════════════════════════════════════
const pickables = [sun];

// Separate tracking maps — no mixing with planetObjs
const planetObjs  = {};   // name → { pivot, mesh, cfg }
const extraMeshes = [];   // { mesh, rotDelta } for cloud/atm layers

let moonAngle = 0, moonMesh = null, moonPivot = null;

PCONF.forEach(cfg => {
  makeOrbit(cfg.orbitR);

  // Pivot rotates to orbit the Sun
  const pivot = new THREE.Object3D();
  pivot.rotation.y = Math.random() * Math.PI * 2;
  scene.add(pivot);

  // Planet sphere
  const matParams = {
    roughness: cfg.name==='Earth' ? 0.55 : 0.85,
    metalness: 0.0
  };
  const texKey = cfg.name;
  if(TEXMAP[texKey]) matParams.map = lt(texKey);
  if(cfg.name==='Earth'){
    matParams.normalMap = lt('EarthNormal');
    matParams.normalScale = new THREE.Vector2(0.8,0.8);
  }

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(cfg.r*1.18, 64, 64),
    new THREE.MeshStandardMaterial(matParams)
  );
  mesh.name = cfg.name;
  mesh.position.x = cfg.orbitR;
  mesh.rotation.z = THREE.MathUtils.degToRad(cfg.tilt||0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  pivot.add(mesh);
  pickables.push(mesh);

  // Earth cloud layer
  if(cfg.name==='Earth'){
    const cloudMesh = new THREE.Mesh(
      new THREE.SphereGeometry(cfg.r*1.18*1.008, 64, 64),
      new THREE.MeshStandardMaterial({
        map: lt('EarthClouds'), transparent:true, opacity:0.38,
        roughness:1, metalness:0, depthWrite:false,
        blending:THREE.AdditiveBlending
      })
    );
    cloudMesh.position.x = cfg.orbitR;
    cloudMesh.rotation.z = THREE.MathUtils.degToRad(cfg.tilt||0);
    cloudMesh.raycast = ()=>{};
    pivot.add(cloudMesh);
    extraMeshes.push({ mesh: cloudMesh, rotDelta: 0.0010 });
  }

  // Saturn rings
  if(cfg.rings){
    const rIn = cfg.r*1.18*1.30, rOut = cfg.r*1.18*2.80;
    const rGeo = new THREE.RingGeometry(rIn, rOut, 256);
    const posA = rGeo.attributes.position, uvA = rGeo.attributes.uv;
    for(let i=0;i<posA.count;i++){
      const v=new THREE.Vector3().fromBufferAttribute(posA,i);
      uvA.setXY(i,(v.length()-rIn)/(rOut-rIn),0.5);
    }
    uvA.needsUpdate = true;
    const ring = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({
      map:makeRingTex(), side:THREE.DoubleSide, transparent:true, depthWrite:false, opacity:0.92
    }));
    ring.rotation.x = Math.PI/2;
    ring.raycast = ()=>{};
    mesh.add(ring);
  }

  // Earth Moon
  if(cfg.moon){
    moonPivot = new THREE.Object3D();
    moonPivot.position.x = cfg.orbitR;
    pivot.add(moonPivot);
    moonMesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.38,32,32),
      new THREE.MeshStandardMaterial({map:lt('Moon'), roughness:0.96, metalness:0})
    );
    moonMesh.name = 'Moon';
    moonMesh.position.x = 3.4;
    moonMesh.raycast = ()=>{};
    moonPivot.add(moonMesh);
  }

  planetObjs[cfg.name] = { pivot, mesh, cfg };
});

// ═══════════════════════════════════════════════════
//  RAYCASTER + POINTER
// ═══════════════════════════════════════════════════
const ray = new THREE.Raycaster();
const pointer = new THREE.Vector2(-9999,-9999);
let lastMX=0, lastMY=0, hoveredName=null;

window.addEventListener('mousemove', e=>{
  pointer.x=(e.clientX/window.innerWidth)*2-1;
  pointer.y=-(e.clientY/window.innerHeight)*2+1;
  lastMX=e.clientX; lastMY=e.clientY;
});
window.addEventListener('click', handleClick);
window.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    pointer.x=(e.touches[0].clientX/window.innerWidth)*2-1;
    pointer.y=-(e.touches[0].clientY/window.innerHeight)*2+1;
    lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
    handleClick();
  }
},{passive:true});

function handleClick(){
  ray.setFromCamera(pointer,cam);
  const hits=ray.intersectObjects(pickables,false);
  if(hits.length && DATA[hits[0].object.name]) zoomTo(hits[0].object.name);
}

// ── TOOLTIP ──
const tip=document.getElementById('tip');
function showTip(name,x,y){
  const d=DATA[name];
  document.getElementById('tname').textContent=name;
  document.getElementById('tmass').textContent=d.tip.mass;
  document.getElementById('tdiam').textContent=d.tip.diam;
  document.getElementById('tdist').textContent=d.tip.dist;
  document.getElementById('trot').textContent=d.tip.rot;
  document.getElementById('trev').textContent=d.tip.rev;
  document.getElementById('tmoons').textContent=d.tip.moons;
  document.getElementById('tmore').onclick=()=>openPanel(name);
  let tx=x+18,ty=y-12;
  if(tx+250>window.innerWidth) tx=x-268;
  if(ty+290>window.innerHeight) ty=y-290;
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
  tip.classList.add('show');
  canvas.style.cursor='pointer';
}
function hideTip(){tip.classList.remove('show');canvas.style.cursor='default';}

// ── ZOOM ──
let camZooming=false;
function zoomTo(name){
  let target=new THREE.Vector3();
  if(name!=='Sun') planetObjs[name].mesh.getWorldPosition(target);
  const radius=name==='Sun'?8:planetObjs[name].cfg.r*1.18;
  const dist=radius*8+6;
  const dir=cam.position.clone().sub(target).normalize();
  animateCam(cam.position.clone(),target.clone().add(dir.multiplyScalar(dist)),ctrl.target.clone(),target.clone(),900,()=>{camZooming=false;});
  camZooming=true;
}
function animateCam(fp,tp,ft,tt,dur,cb){
  const s=performance.now();
  (function step(now){
    const t=Math.min((now-s)/dur,1),e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    cam.position.lerpVectors(fp,tp,e);
    ctrl.target.lerpVectors(ft,tt,e);
    ctrl.update();
    t<1?requestAnimationFrame(step):cb&&cb();
  })(performance.now());
}

// ── PANEL ──
window.openPanel=function(name){
  const d=DATA[name];
  document.getElementById('pname').textContent=name;
  document.getElementById('ptype').textContent=d.type;
  document.getElementById('pemoji').textContent=d.emoji;
  document.getElementById('pdesc').textContent=d.desc;
  document.getElementById('pstats').innerHTML=Object.entries(d.stats).map(([k,v])=>`<div class="stat-box"><div class="sk">${k}</div><div class="sv">${v}</div></div>`).join('');
  document.getElementById('pmoons').innerHTML=d.moons.length?d.moons.map(m=>`<span class="moon-tag">🌕 ${m}</span>`).join(''):`<span style="color:rgba(255,255,255,.25);font-size:.8rem">No known moons</span>`;
  document.getElementById('pfacts').innerHTML=d.facts.map(f=>`<div class="fact-box"><div class="fk">⭐ Did You Know?</div><p>${f}</p></div>`).join('');
  document.getElementById('panel').classList.add('open');
};
window.closePanel=function(){document.getElementById('panel').classList.remove('open');};

// ── SPEED ──
let spd=1;
window.setSpd=function(s,btn){
  spd=s;
  document.querySelectorAll('.spd-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
};

// ── LABELS ──
const lblCanvas=document.getElementById('labels');
const lblCtx=lblCanvas.getContext('2d');
function resizeLabels(){lblCanvas.width=window.innerWidth;lblCanvas.height=window.innerHeight;}
resizeLabels();
function drawLabels(){
  lblCtx.clearRect(0,0,lblCanvas.width,lblCanvas.height);
  // Only iterate known planet names + sun — never __clouds etc
  const targets=[{name:'Sun',mesh:sun},...PCONF.map(c=>({name:c.name,mesh:planetObjs[c.name].mesh}))];
  targets.forEach(({name,mesh})=>{
    const wp=new THREE.Vector3();
    mesh.getWorldPosition(wp);
    const sp=wp.clone().project(cam);
    if(sp.z>1) return;
    const x=(sp.x+1)/2*lblCanvas.width;
    const y=(-sp.y+1)/2*lblCanvas.height;
    lblCtx.save();
    lblCtx.font='bold 11px Orbitron,sans-serif';
    lblCtx.fillStyle='rgba(0,229,255,0.5)';
    lblCtx.textAlign='center';
    lblCtx.fillText(name.toUpperCase(),x,y-22);
    lblCtx.restore();
  });
}

// ═══════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════
const clock=new THREE.Clock();

// ── HIDE LOADER on first rendered frame ──
let _loaderHidden = false;
function hideLoader(){
  if(_loaderHidden) return;
  _loaderHidden = true;
  clearTimeout(window._threeLoadTimer); // cancel error timeout
  const l = document.getElementById('loader');
  if(l) l.classList.add('out');
}

renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta();

  // Sun self-rotation
  sun.rotation.y += dt*0.02*spd;

  // Planet revolution (pivot) + self-rotation (mesh)
  PCONF.forEach(cfg=>{
    const o=planetObjs[cfg.name];
    o.pivot.rotation.y += cfg.spd * 0.006 * spd * dt * 60;
    o.mesh.rotation.y  += cfg.selfRot * 0.04 * spd * dt * 60;
  });

  // Extra layer rotation (clouds etc)
  extraMeshes.forEach(({mesh,rotDelta})=>{
    mesh.rotation.y += rotDelta * spd * dt * 60;
  });

  // Moon orbit
  if(moonMesh && moonPivot){
    moonAngle += 2.0 * spd * dt;
    moonPivot.rotation.y = moonAngle;
  }

  // Hover raycasting
  if(!camZooming){
    ray.setFromCamera(pointer,cam);
    const hits=ray.intersectObjects(pickables,false);
    if(hits.length && DATA[hits[0].object.name]){
      showTip(hits[0].object.name,lastMX,lastMY);
    } else {
      hoveredName=null; hideTip();
    }
  }

  ctrl.update();
  renderer.render(scene,cam);
  drawLabels();

  // Hide loader on the very first completed frame
  hideLoader();
});

// ── RESIZE ──
window.addEventListener('resize',()=>{
  cam.aspect=window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  resizeLabels();
});

} // end if(typeof THREE !== 'undefined')

}); // end threejs-ready

// ═══════════════════════════════════════════════════
//  🎵 YOUTUBE AUDIO  (IFrame API)
//  Track: "Eternal" space ambient — gCWaRhNUvfc
// ═══════════════════════════════════════════════════
let ytPlayer = null;
let ytReady  = false;
let soundOn  = false;
const YT_VIDEO_ID = 'gCWaRhNUvfc';

// Called automatically by YouTube IFrame API when script loads
window.onYouTubeIframeAPIReady = function(){
  ytPlayer = new YT.Player('yt-player', {
    videoId: YT_VIDEO_ID,
    playerVars:{
      autoplay: 0,
      loop: 1,
      playlist: YT_VIDEO_ID,  // required for loop
      controls: 0,
      mute: 0,
      rel: 0,
      modestbranding: 1
    },
    events:{
      onReady: () => { ytReady = true; },
      onStateChange: e => {
        // If video ends for any reason, restart
        if(e.data === YT.PlayerState.ENDED) ytPlayer.playVideo();
      }
    }
  });
};

function startYT(){
  if(!ytReady || !ytPlayer) return;
  ytPlayer.setVolume(55);
  ytPlayer.playVideo();
  soundOn = true;
  updateSoundBtn(true);
}

window.toggleSound = function(){
  if(!ytReady || !ytPlayer){ return; }
  if(soundOn){
    ytPlayer.pauseVideo();
    soundOn=false;
    updateSoundBtn(false);
  } else {
    ytPlayer.playVideo();
    soundOn=true;
    updateSoundBtn(true);
  }
};

function updateSoundBtn(on){
  const btn=document.getElementById('snd-btn');
  btn.querySelector('.snd-icon').textContent = on ? '🔊' : '🔇';
  on ? btn.classList.add('playing') : btn.classList.remove('playing');
}

// Auto-start on first user gesture (browser autoplay policy)
let audioStarted=false;
function tryStartAudio(){
  if(audioStarted) return;
  audioStarted=true;
  // Small delay to let YT player initialise if needed
  setTimeout(startYT, 400);
}
['click','keydown','touchstart'].forEach(e=>
  window.addEventListener(e, tryStartAudio, {once:true, passive:true}));

</script>
